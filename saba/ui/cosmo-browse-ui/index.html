<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles.css" />
    <title>CosmoBrowse</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main class="browser-shell">
      <section class="tabs-panel">
        <div class="tabs-header">
          <h1>CosmoBrowse</h1>
          <button id="new-tab-button" class="ghost-button" type="button">+ Tab</button>
        </div>
        <ul id="tabs-list" class="tabs-list"></ul>
      </section>

      <section class="browser-chrome">
        <form id="url-form" class="toolbar">
          <div class="nav-group">
            <button id="back-button" type="button">Back</button>
            <button id="forward-button" type="button">Forward</button>
            <button id="reload-button" type="button">Reload</button>
          </div>
          <input id="url-input" class="address-input" placeholder="URL or search query" />
          <button class="primary-button" type="submit">Open</button>
        </form>
        <ul id="search-results" class="search-results hidden"></ul>
      </section>

      <section class="viewport-shell">
        <header class="page-meta">
          <div>
            <p id="page-title" class="page-title">New Tab</p>
            <p id="current-url" class="current-url">URL: (none)</p>
          </div>
          <p id="status" class="status">Ready.</p>
        </header>

        <div id="viewport" class="viewport">
          <div id="scene-root" class="scene-root"></div>
        </div>
      </section>
    </main>
  </body>
</html>
