<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CosmoBrowse</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="app-shell">
      <header>
        <h1>CosmoBrowse (Tauri v2)</h1>
      </header>

      <form id="url-form" class="toolbar">
        <button id="back-button" type="button">← Back</button>
        <button id="forward-button" type="button">Forward →</button>
        <button id="reload-button" type="button">Reload</button>
        <input id="url-input" placeholder="http://example.com" />
        <button type="submit">Open</button>
      </form>

      <p id="status" class="status">Ready.</p>

      <section>
        <h2>Snapshot</h2>
        <p id="current-url" class="muted"></p>
        <ul id="text-list"></ul>
      </section>
    </main>
  </body>
</html>
