name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saba
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo check stable-target crates
        run: cargo check -p saba_core -p saba_app -p adapter_cli
      - name: cargo test stable-target crates
        run: cargo test -p saba_core -p saba_app -p adapter_cli

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saba/ui/cosmo-browse-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm install
        run: npm install
      - name: npm run build
        run: npm run build